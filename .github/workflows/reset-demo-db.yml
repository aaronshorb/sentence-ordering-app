name: Reset Demo Database

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: reset-demo-db
  cancel-in-progress: true

jobs:
  reset-demo-db:
    runs-on: ubuntu-24.04

    steps:
      - uses: neondatabase/reset-branch-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: demo-live
          parent: true
          api_key: ${{ secrets.NEON_API_KEY }}