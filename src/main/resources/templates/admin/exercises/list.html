<!DOCTYPE html>
<html lang="en">
<head>
    <title>Exercises</title>
</head>
<body>

<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>

<h1>Exercises</h1>

<a href="/">Home</a>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Grade</th>
        <th>Unit</th>
        <th>Reading</th>
        <th>Title</th>
        <th>Sentences</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="exercise : ${exercises}">
        <td th:text="${exercise.id}">1</td>
        <td th:text="${exercise.grade}">1</td>
        <td th:text="${exercise.unitNumber}">1</td>
        <td th:text="${exercise.readingNumber}">1</td>
        <td th:text="${exercise.title}"></td>
        <td th:text="${#lists.size(exercise.sentences)}">5</td>
        <td>
            <form th:action="@{/admin/exercises/{id}/play(id=${exercise.id})}" method="get" style="display:inline;">
                <button type="submit">Preview</button>
            </form>

            <form th:action="@{/admin/exercises/{id}/edit(id=${exercise.id})}" method="get" style="display:inline;">
                <button type="submit">Edit</button>
            </form>

            <form th:action="@{/admin/exercises/{id}/delete(id=${exercise.id})}" method="post" style="display:inline;">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<form th:action="@{/admin/grades/{grade}/exercises/new(grade=${grade})}">
    <button type="submit">
        Add Exercise
    </button>
</form>

<form th:action="@{/admin/grades/{grade}/progress(grade=${grade})}">
    <button type="submit">
        View Student Progress
    </button>
</form>

<form th:action="@{/admin/grades/{grade}/progress/reset(grade=${grade})}" method="post">
    <button type="submit"
            onclick="return confirm('Reset all student progress for this grade?')">
        Reset Student Progress
    </button>
</form>


</body>
</html>
