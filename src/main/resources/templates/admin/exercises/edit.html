<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Exercise</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-soft-body">
<header class="app-topbar">
    <a class="topbar-back-link"
       th:href="@{/admin/grades/{grade}/exercises(grade=${grade}, unitNumber=${exerciseForm.unitNumber})}">
        Back to Admin Panel
    </a>

    <nav class="topbar-nav" aria-label="Primary">
        <a href="/" class="topbar-link">Home</a>

        <div th:replace="~{fragments/account-menu :: accountMenu}"></div>
    </nav>
</header>

<main class="content-page form-page">
    <section class="content-heading">
        <h1>Edit Exercise</h1>
        <p>Update the exercise details and sentence order.</p>
    </section>

    <form th:action="@{/admin/exercises/{id}/edit(id=${exerciseForm.id})}" th:object="${exerciseForm}" method="post" class="detail-form">
        <div class="detail-form-card">
            <input type="hidden" th:field="*{grade}">

            <div class="message message-error"
                 th:if="${#fields.hasGlobalErrors()}"
                 th:each="error : ${#fields.globalErrors()}"
                 th:text="${error}">
                An exercise already exists for this grade, unit, and reading.
            </div>

            <div class="form-field-grid">
                <div class="field-group">
                    <label for="unitNumber">Unit</label>
                    <input id="unitNumber" type="number" th:field="*{unitNumber}" min="1" max="20">
                </div>

                <div class="field-group">
                    <label for="readingNumber">Reading</label>
                    <input id="readingNumber" type="number" th:field="*{readingNumber}" min="1" max="25">
                </div>
            </div>

            <div class="field-group">
                <label for="title">Title</label>
                <input id="title" type="text" th:field="*{title}">
            </div>

            <div class="field-group">
                <label for="readingText">Text</label>
                <p class="field-help">Enter one sentence per line. The line order is the correct order.</p>
                <textarea id="readingText" th:field="*{readingText}" rows="6"></textarea>
            </div>

            <div class="field-group">
                <label for="audioLink">Audio Link</label>
                <input id="audioLink" type="text" th:field="*{audioLink}">
                <p class="field-error"
                   th:if="${#fields.hasErrors('audioLink')}"
                   th:errors="*{audioLink}">
                    Audio link error
                </p>
            </div>
        </div>

        <button type="submit" class="detail-form-submit primary-submit-button">Save Changes</button>
    </form>
</main>
</body>
</html>
