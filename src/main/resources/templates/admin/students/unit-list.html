<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Progress by Unit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-soft-body">
<header class="app-topbar">
    <a class="topbar-back-link" th:href="@{/admin/grades/{grade}/exercises(grade=${grade})}">
        Back to Admin Panel
    </a>

    <nav class="topbar-nav" aria-label="Primary">
        <a href="/" class="topbar-link">Home</a>

        <div th:replace="~{fragments/account-menu :: accountMenu}"></div>
    </nav>
</header>

<main class="content-page progress-unit-page">
    <section class="content-heading">
        <p class="heading-meta">Grade <span th:text="${grade}">1</span></p>
        <h1>Student Progress by Unit</h1>
        <p>Select a unit to view student completion progress.</p>
    </section>

    <section class="unit-list-panel" aria-label="Units with student progress">
        <a class="unit-list-row progress-unit-row"
           th:each="unit : ${units}"
           th:href="@{/admin/grades/{grade}/progress/units/{unitNumber}(grade=${grade}, unitNumber=${unit})}">
            <span class="unit-list-title">
                Unit <span th:text="${unit}">1</span>
            </span>

            <span class="unit-row-arrow" aria-hidden="true">›</span>
        </a>
    </section>
</main>
</body>
</html>
