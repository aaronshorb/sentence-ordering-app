<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Sentence Ordering App</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="exercise-play-body">
<header class="app-topbar">
    <span class="app-topbar-spacer" aria-hidden="true"></span>

    <nav class="topbar-nav" aria-label="Primary">
        <form sec:authorize="!isAuthenticated()" action="/login" method="get" class="inline-form">
            <button type="submit" class="topbar-button">Login</button>
        </form>

        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="inline-form" onsubmit="return confirm('Log out?')">
            <button type="submit" class="topbar-button">Logout</button>
        </form>
    </nav>
</header>

<main class="student-exercise-page">
    <section class="exercise-heading home-heading">
        <h1>Sentence Ordering</h1>
    </section>

    <section class="home-action-panel" aria-label="Home actions">
        <a sec:authorize="hasRole('STUDENT')" href="/student/exercises" class="home-action-row">
            <span class="home-action-main">
                <span class="home-action-title">Student Exercises</span>
                <span class="home-action-description">Choose a unit and start practicing.</span>
            </span>
            <span class="unit-row-arrow" aria-hidden="true">›</span>
        </a>

        <a sec:authorize="hasRole('ADMIN')" href="/admin/grades/1/exercises" class="home-action-row">
            <span class="home-action-main">
                <span class="home-action-title">Open Admin Panel</span>
                <span class="home-action-description">Manage exercises and view student progress.</span>
            </span>
            <span class="unit-row-arrow" aria-hidden="true">›</span>
        </a>
    </section>
</main>
</body>
</html>
