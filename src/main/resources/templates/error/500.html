<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Something went wrong</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-soft-body">
<header class="app-topbar">
    <a href="/" class="topbar-back-link">Back to Home</a>
</header>

<main class="content-page form-page error-page">
    <section class="error-card">
        <p class="error-code">500</p>

        <div class="content-heading">
            <h1>Something went wrong</h1>
            <p th:text="${message}">Something went wrong.</p>
        </div>

        <div class="error-actions">
            <a href="/" class="outline-action-button">Back to Home</a>
        </div>
    </section>
</main>
</body>
</html>
