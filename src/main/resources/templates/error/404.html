<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Not Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-soft-body">
<header class="app-topbar">
    <a href="/" class="topbar-back-link">Back to Home</a>
</header>

<main class="content-page form-page error-page">
    <section class="error-card">
        <p class="error-code">404</p>

        <div class="content-heading">
            <h1>Page not found</h1>
            <p th:text="${message}">The requested resource was not found.</p>
        </div>

        <div class="error-actions">
            <a href="/" class="outline-action-button">Back to Home</a>
        </div>
    </section>
</main>
</body>
</html>
