<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Exercises</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="exercise-play-body">
<header class="app-topbar">
    <span class="app-topbar-spacer" aria-hidden="true"></span>

    <nav class="topbar-nav" aria-label="Exercise navigation">
        <a href="/" class="topbar-link">Home</a>

        <form th:action="@{/logout}" method="post" class="inline-form" onsubmit="return confirm('Log out?')">
            <button type="submit" class="topbar-button">Logout</button>
        </form>
    </nav>
</header>

<main class="student-exercise-page">
    <section class="exercise-heading">
        <h1>Exercises</h1>
        <p>Select a unit to see its readings.</p>
    </section>

    <section class="unit-list-panel" aria-label="Units">
        <a class="unit-list-row"
           th:each="unit : ${units}"
           th:with="readingCount=${readingCounts.get(unit)}"
           th:href="@{/student/exercises/units/{unitNumber}(unitNumber=${unit})}">
            <span class="unit-list-title">
                Unit <span th:text="${unit}">1</span>
            </span>

            <span class="unit-reading-count"
                  th:text="${readingCount == 1 ? '1 reading' : readingCount + ' readings'}">
                1 reading
            </span>

            <span class="unit-row-arrow" aria-hidden="true">›</span>
        </a>
    </section>
</main>
</body>
</html>
