<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Log In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="exercise-play-body">
<header class="app-topbar">
    <a href="/" class="topbar-link">Home</a>
</header>

<main class="login-page">
    <section class="exercise-heading">
        <h1>Log In</h1>
        <p>Enter your username and password to continue.</p>
    </section>

    <div th:if="${param.error}" class="message message-error">
        Invalid username and password.
    </div>

    <div th:if="${param.logout}" class="message message-success">
        You have been logged out.
    </div>

    <form th:action="@{/login}" method="post" class="login-card">
        <div class="field-group">
            <label for="username">Username</label>
            <input id="username" type="text" name="username" autocomplete="username">
        </div>

        <div class="field-group">
            <label for="password">Password</label>
            <input id="password" type="password" name="password" autocomplete="current-password">
        </div>

        <button type="submit" class="login-button primary-submit-button">Log in</button>
    </form>
</main>
</body>
</html>
